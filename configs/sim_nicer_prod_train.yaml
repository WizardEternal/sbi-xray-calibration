# NICER training datasets (50000 rows/level) for the NPE flows -- mirrors
# sim_modelA_prod_train.yaml but response: NICER. Distinct seed_offsets (11/12/13)
# from the eval set (sim_nicer_prod.yaml, offsets 1/2/3) so train != eval.
name: modelA_nicer_train
base_model: tbabs_powerlaw_bb
response: NICER
seed: 20260611
n: 50000
priors:
  tbabs_1_nh:          {dist: uniform,    low: 0.15,   high: 0.35}
  powerlaw_1_alpha:    {dist: uniform,    low: 1.0,    high: 3.0}
  powerlaw_1_norm:     {dist: loguniform, low: 1.0e-4, high: 1.0e-2}
  blackbodyrad_1_kT:   {dist: uniform,    low: 0.3,    high: 3.0}
  blackbodyrad_1_norm: {dist: loguniform, low: 1.0e-2, high: 1.0}
calibration:
  probe_exposure_s: 10000.0
levels:
  - {name: faint,  target_counts: 100,   exposure_s: 26.6,   n: 50000, seed_offset: 11}
  - {name: medium, target_counts: 1000,  exposure_s: 266.5,  n: 50000, seed_offset: 12}
  - {name: bright, target_counts: 10000, exposure_s: 2664.7, n: 50000, seed_offset: 13}
